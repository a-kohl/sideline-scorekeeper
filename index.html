<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LFA Live">
<meta name="theme-color" content="#0B1F3A">
<title>LFA Live Soccer Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1F3A;
    --navy-light: #142c4f;
    --red: #D31027;
    --blue: #2C5DA6;
    --chalk: #F4F5F0;
    --slate: #7C8598;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% 0%, #16305a, #060f1f 65%);
    font-family: 'Inter', sans-serif;
    color: var(--chalk);
    display: flex;
    justify-content: center;
    padding: 28px 12px 56px;
  }

  .phone {
    width: 100%;
    max-width: 400px;
    background: var(--navy);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.08);
    height: fit-content;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    background: var(--navy-light);
    border-bottom: 2px solid var(--red);
  }

  .wordmark {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    letter-spacing: 1.5px;
    font-size: 16px;
    text-transform: uppercase;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--slate);
  }

  .live-badge.is-live { color: var(--red); }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--slate); }
  .live-badge.is-live .dot { background: var(--red); }

  @media (prefers-reduced-motion: no-preference) {
    .live-badge.is-live .dot { animation: pulse 1.4s ease-in-out infinite; }
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .scoreboard {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 14px;
    padding: 24px 16px 6px;
  }

  .score-block { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; }

  .team-name {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
    font-size: 15px;
    text-transform: uppercase;
    text-align: center;
    max-width: 100%;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px dashed transparent;
  }

  .team-name:focus {
    outline: none;
    border-color: rgba(244,245,240,0.35);
  }

  .score-value {
    position: relative;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(52px, 16vw, 76px);
    line-height: 1;
    color: var(--red);
    text-shadow: 0 0 16px rgba(211,16,39,0.55);
    min-width: 1em;
    text-align: center;
  }

  .score-value::before {
    content: '8';
    position: absolute;
    inset: 0;
    color: rgba(211,16,39,0.08);
    z-index: -1;
  }

  .score-dash { font-family: 'Oswald', sans-serif; font-size: 30px; color: var(--slate); font-weight: 600; margin-top: 34px; }

  .score-btns { display: flex; gap: 6px; width: 100%; }

  .btn-goal {
    flex: 1;
    padding: 12px 0;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
  }

  .btn-goal:active { transform: scale(0.96); }
  .btn-goal:hover { background: #b60d21; }
  .btn-goal:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

  .btn-correct {
    padding: 12px 10px;
    background: rgba(255,255,255,0.06);
    color: var(--slate);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }

  .btn-correct:hover { background: rgba(255,255,255,0.12); }
  .btn-correct:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

  .clock-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 18px 20px 22px;
    border-top: 1px solid rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .clock-big {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 34px;
    letter-spacing: 2px;
    background: rgba(0,0,0,0.28);
    padding: 6px 22px;
    border-radius: 8px;
  }

  .clock-buttons { display: flex; gap: 8px; }

  .clock-buttons button {
    padding: 11px 22px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: var(--navy-light);
    color: var(--chalk);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }

  .clock-buttons button:hover { background: #1c3760; }
  .clock-buttons button:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  #start-stop.running { background: var(--red); border-color: var(--red); }

  .event-buttons { padding: 16px 20px 8px; }

  .event-buttons h3, .panel h3 {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 1.5px;
    color: var(--slate);
    margin: 0 0 10px;
    text-transform: uppercase;
  }

  .event-team-select { display: flex; gap: 6px; margin-bottom: 10px; }

  .team-toggle {
    flex: 1;
    padding: 8px 0;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--slate);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
  }

  .team-toggle.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .team-toggle:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

  .event-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  .event-grid button {
    padding: 12px 4px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--chalk);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }

  .event-grid button:hover { background: rgba(255,255,255,0.1); }
  .event-grid button:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

  .panel {
    background: var(--chalk);
    color: var(--navy);
    padding: 16px 20px 24px;
    margin-top: 6px;
  }

  .panel ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; max-height: 220px; overflow-y: auto; }

  .panel li {
    display: flex;
    gap: 10px;
    font-size: 14px;
    align-items: baseline;
    border-bottom: 1px solid rgba(11,31,58,0.08);
    padding-bottom: 8px;
  }

  .panel .empty-state { font-size: 13px; color: var(--slate); }

  .event-time { font-family: 'Oswald', sans-serif; font-weight: 600; color: var(--blue); min-width: 46px; }

  @media (max-width: 360px) {
    .score-value { font-size: 46px; }
    .clock-big { font-size: 26px; }
  }
</style>
</head>
<body>

  <div class="phone">
    <div class="topbar">
      <span class="wordmark">LFA Live</span>
      <span class="live-badge" id="live-badge"><span class="dot"></span><span id="live-text">Ready</span></span>
    </div>

    <div class="scoreboard">
      <div class="score-block">
        <span class="team-name" contenteditable="true" spellcheck="false" id="home-name">Home</span>
        <span class="score-value" id="home-score">0</span>
        <div class="score-btns">
          <button class="btn-goal" data-team="home">+ Goal</button>
          <button class="btn-correct" data-team="home">-1</button>
        </div>
      </div>
      <span class="score-dash">-</span>
      <div class="score-block">
        <span class="team-name" contenteditable="true" spellcheck="false" id="away-name">Away</span>
        <span class="score-value" id="away-score">0</span>
        <div class="score-btns">
          <button class="btn-goal" data-team="away">+ Goal</button>
          <button class="btn-correct" data-team="away">-1</button>
        </div>
      </div>
    </div>

    <div class="clock-section">
      <span class="clock-big" id="clock">00:00</span>
      <div class="clock-buttons">
        <button id="start-stop">Start</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>

    <div class="event-buttons">
      <h3>+ Add Event</h3>
      <div class="event-team-select">
        <button class="team-toggle active" data-team="home" id="toggle-home">Home</button>
        <button class="team-toggle" data-team="away" id="toggle-away">Away</button>
      </div>
      <div class="event-grid">
        <button data-event="Yellow">Yellow</button>
        <button data-event="Red">Red</button>
        <button data-event="Sub">Sub</button>
        <button data-event="Foul">Foul</button>
        <button data-event="Corner">Corner</button>
        <button data-event="Offside">Offside</button>
      </div>
    </div>

    <div class="panel">
      <h3>Events</h3>
      <ul id="events-list"></ul>
    </div>
  </div>

<script>
  const state = {
    homeScore: 0,
    awayScore: 0,
    clockSeconds: 0,
    running: false,
    eventTeam: 'home',
    events: []
  };

  let timer = null;

  function formatClock(totalSeconds) {
    const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
    const s = (totalSeconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  function currentMatchMinute() {
    return Math.floor(state.clockSeconds / 60) + "'";
  }

  function teamName(team) {
    const el = document.getElementById(team + '-name');
    return el.textContent.trim() || (team === 'home' ? 'Home' : 'Away');
  }

  function renderEvents() {
    const list = document.getElementById('events-list');
    list.innerHTML = '';
    if (state.events.length === 0) {
      const li = document.createElement('li');
      li.innerHTML = '<span class="empty-state">No events logged yet.</span>';
      list.appendChild(li);
      return;
    }
    [...state.events].reverse().forEach(ev => {
      const li = document.createElement('li');
      const timeSpan = document.createElement('span');
      timeSpan.className = 'event-time';
      timeSpan.textContent = ev.time;
      const textSpan = document.createElement('span');
      textSpan.textContent = ev.text;
      li.appendChild(timeSpan);
      li.appendChild(textSpan);
      list.appendChild(li);
    });
  }

  function render() {
    document.getElementById('home-score').textContent = state.homeScore;
    document.getElementById('away-score').textContent = state.awayScore;
    document.getElementById('clock').textContent = formatClock(state.clockSeconds);

    const startStopBtn = document.getElementById('start-stop');
    startStopBtn.textContent = state.running ? 'Stop' : 'Start';
    startStopBtn.classList.toggle('running', state.running);

    const liveBadge = document.getElementById('live-badge');
    liveBadge.classList.toggle('is-live', state.running);
    document.getElementById('live-text').textContent = state.running ? 'Live' : 'Ready';

    document.getElementById('toggle-home').classList.toggle('active', state.eventTeam === 'home');
    document.getElementById('toggle-away').classList.toggle('active', state.eventTeam === 'away');

    renderEvents();
  }

  function addEvent(text) {
    state.events.push({ time: currentMatchMinute(), text });
    render();
  }

  function tick() {
    state.clockSeconds++;
    render();
  }

  document.getElementById('start-stop').addEventListener('click', () => {
    state.running = !state.running;
    if (state.running) {
      timer = setInterval(tick, 1000);
    } else {
      clearInterval(timer);
    }
    render();
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    if (!window.confirm('Reset score, clock, and events for a new game?')) return;
    state.homeScore = 0;
    state.awayScore = 0;
    state.clockSeconds = 0;
    state.events = [];
    state.running = false;
    clearInterval(timer);
    render();
  });

  document.querySelectorAll('.btn-goal').forEach(btn => {
    btn.addEventListener('click', () => {
      const team = btn.dataset.team;
      if (team === 'home') { state.homeScore++; }
      else { state.awayScore++; }
      addEvent(`Goal, ${teamName(team)}`);
    });
  });

  document.querySelectorAll('.btn-correct').forEach(btn => {
    btn.addEventListener('click', () => {
      const team = btn.dataset.team;
      if (team === 'home') { state.homeScore = Math.max(0, state.homeScore - 1); }
      else { state.awayScore = Math.max(0, state.awayScore - 1); }
      render();
    });
  });

  document.getElementById('toggle-home').addEventListener('click', () => {
    state.eventTeam = 'home';
    render();
  });

  document.getElementById('toggle-away').addEventListener('click', () => {
    state.eventTeam = 'away';
    render();
  });

  document.querySelectorAll('.event-grid button').forEach(btn => {
    btn.addEventListener('click', () => {
      const label = btn.dataset.event;
      const map = {
        Yellow: 'Yellow card',
        Red: 'Red card',
        Sub: 'Substitution',
        Foul: 'Foul',
        Corner: 'Corner kick',
        Offside: 'Offside'
      };
      addEvent(`${map[label] || label}, ${teamName(state.eventTeam)}`);
    });
  });

  render();
</script>
</body>
</html>
